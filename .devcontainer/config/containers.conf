[containers]
# keep-id maps the current user's UID directly into inner containers without
# calling newuidmap. This avoids the duplicate host-UID range error that occurs
# when Podman auto-generates subuid mappings inside an already-namespaced env.
userns = "keep-id"

# Minimal capability set for workloads spawned by Claude Code.
# Extend this list only when a specific workload requires it.
default_capabilities = [
  "CHOWN",
  "DAC_OVERRIDE",
  "FOWNER",
  "FSETID",
  "KILL",
  "NET_BIND_SERVICE",
  "SETFCAP",
  "SETGID",
  "SETPCAP",
  "SETUID",
  "SYS_CHROOT"
]

[network]
# netavark is the default modern backend; cni is kept as fallback for older images
network_backend = "netavark"

[engine]
# cgroupfs is required when running rootless inside a container (no systemd)
cgroup_manager = "cgroupfs"
# file-based events avoid requiring a running journald inside the container
events_logger = "file"
