[storage]
# overlay with fuse-overlayfs works rootless without kernel overlay support
driver = "overlay"

[storage.options]
additionalimagestores = []

[storage.options.overlay]
# Use fuse-overlayfs instead of native overlay (required for rootless-in-rootless)
mount_program = "/usr/bin/fuse-overlayfs"
mountopt = "nodev,fsync=0"
