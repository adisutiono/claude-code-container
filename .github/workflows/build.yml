name: Build and test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build image and run container checks (WSL2 / linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Podman and nested-container dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            podman \
            fuse-overlayfs \
            uidmap \
            slirp4netns

      - name: Build image
        run: |
          podman build \
            --platform linux/amd64 \
            --file .devcontainer/Containerfile \
            --tag claude-code-devcontainer:ci \
            --build-arg USERNAME=claude \
            --build-arg USER_UID=1000 \
            --build-arg USER_GID=1000 \
            .

      - name: Run container checks
        run: |
          # Make root rshared so inner Podman can propagate bind mounts —
          # mirrors what post-create.sh does at devcontainer start.
          sudo mount --make-rshared /

          # --privileged is required in CI so inner Podman can initialise its
          # storage driver (fuse-overlayfs) and create user namespaces.
          # In a real devcontainer the runArgs in devcontainer.json supply the
          # equivalent capabilities; --privileged is acceptable for CI only.
          podman run --rm \
            --privileged \
            --env CI=true \
            --volume "${{ github.workspace }}/tests:/tests:ro" \
            claude-code-devcontainer:ci \
            bash /tests/container-checks.sh
